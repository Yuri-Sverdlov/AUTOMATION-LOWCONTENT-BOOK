<svg width="680" height="1180" viewBox="0 0 680 1180" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Полный цикл создания блокнотов для Amazon</title>
<desc>Карта ума: ветка поиска ниши и еженедельный цикл из шести шагов, где SEO-ядро питает только генерацию Title и Blurb.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<style>
text { font-family: Arial, "Helvetica Neue", sans-serif; }
.t { font-size: 14px; fill: #2C2C2A; }
.ts { font-size: 12px; fill: #5F5E5A; }
.th { font-size: 14px; font-weight: 500; fill: #2C2C2A; }
.arr { stroke: #888780; stroke-width: 1.5; fill: none; }
.bg { fill: #FFFFFF; }
</style>
</defs>
<rect class="bg" x="0" y="0" width="680" height="1180"/>

<text class="th" x="340" y="30" text-anchor="middle">Полный цикл: блокнот с оригинальным названием</text>

<rect x="200" y="50" width="280" height="56" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="340" y="72" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Старт</text>
<text class="ts" x="340" y="90" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Выбор направления работы</text>

<line x1="280" y1="106" x2="170" y2="150" class="arr" marker-end="url(#arrow)"/>
<line x1="400" y1="106" x2="510" y2="150" class="arr" marker-end="url(#arrow)"/>

<rect x="40" y="150" width="270" height="56" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="175" y="172" text-anchor="middle" dominant-baseline="central" fill="#712B13">Ветка A: поиск новой ниши</text>
<text class="ts" x="175" y="190" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Редко, при выходе в сегмент</text>

<rect x="370" y="150" width="270" height="56" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="505" y="172" text-anchor="middle" dominant-baseline="central" fill="#085041">Ветка Б: работа в нише</text>
<text class="ts" x="505" y="190" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Еженедельно, 21 блокнот</text>

<line x1="175" y1="206" x2="175" y2="250" class="arr" marker-end="url(#arrow)"/>
<rect x="40" y="250" width="270" height="56" rx="10" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="175" y="272" text-anchor="middle" dominant-baseline="central" fill="#712B13">Оценка и выбор ниши</text>
<text class="ts" x="175" y="290" text-anchor="middle" dominant-baseline="central" fill="#993C1D">Найдена — переход в ветку Б</text>
<line x1="175" y1="306" x2="175" y2="340" class="arr" marker-end="url(#arrow)"/>
<line x1="175" y1="340" x2="505" y2="340" class="arr" marker-end="url(#arrow)" stroke-dasharray="4 4"/>

<line x1="505" y1="206" x2="505" y2="370" class="arr" marker-end="url(#arrow)"/>

<rect x="370" y="370" width="270" height="56" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="505" y="392" text-anchor="middle" dominant-baseline="central" fill="#085041">Шаг 1. Тренды в нише</text>
<text class="ts" x="505" y="410" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Что набирает популярность</text>
<line x1="505" y1="426" x2="505" y2="460" class="arr" marker-end="url(#arrow)"/>

<rect x="370" y="460" width="270" height="56" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="505" y="482" text-anchor="middle" dominant-baseline="central" fill="#085041">Шаг 2. Топ-продажи</text>
<text class="ts" x="505" y="500" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">10-15 лучших блокнотов</text>

<text class="ts" x="340" y="548" text-anchor="middle">Топ-продажи дают два потока</text>
<line x1="440" y1="516" x2="250" y2="570" class="arr" marker-end="url(#arrow)"/>
<line x1="560" y1="516" x2="560" y2="570" class="arr" marker-end="url(#arrow)"/>

<rect x="60" y="570" width="280" height="64" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="200" y="590" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Поток 1. Seed-фразы</text>
<text class="ts" x="200" y="610" text-anchor="middle" dominant-baseline="central" fill="#185FA5">3-6 названий как основа</text>
<text class="ts" x="200" y="624" text-anchor="middle" dominant-baseline="central" fill="#185FA5">для генерации</text>

<rect x="420" y="570" width="220" height="64" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="530" y="590" text-anchor="middle" dominant-baseline="central" fill="#633806">Поток 2. Тексты Amazon</text>
<text class="ts" x="530" y="610" text-anchor="middle" dominant-baseline="central" fill="#854F0B">Product Title + Blurb</text>
<text class="ts" x="530" y="624" text-anchor="middle" dominant-baseline="central" fill="#854F0B">конкурентов</text>

<line x1="530" y1="634" x2="530" y2="668" class="arr" marker-end="url(#arrow)"/>
<rect x="420" y="668" width="220" height="56" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="530" y="690" text-anchor="middle" dominant-baseline="central" fill="#633806">SEO-ядро</text>
<text class="ts" x="530" y="708" text-anchor="middle" dominant-baseline="central" fill="#854F0B">Ключевые слова для поиска</text>

<line x1="200" y1="634" x2="200" y2="760" class="arr" marker-end="url(#arrow)"/>

<rect x="60" y="760" width="280" height="64" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="200" y="780" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Шаг 3-4. Генерация названий</text>
<text class="ts" x="200" y="800" text-anchor="middle" dominant-baseline="central" fill="#185FA5">3 агента — 18 вариантов</text>
<text class="ts" x="200" y="814" text-anchor="middle" dominant-baseline="central" fill="#185FA5">судья — top-6</text>

<line x1="200" y1="824" x2="200" y2="880" class="arr" marker-end="url(#arrow)"/>

<rect x="60" y="880" width="280" height="72" rx="10" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text class="th" x="200" y="900" text-anchor="middle" dominant-baseline="central" fill="#27500A">Шаг 5. Title + Blurb</text>
<text class="ts" x="200" y="920" text-anchor="middle" dominant-baseline="central" fill="#3B6D11">Для каждого названия:</text>
<text class="ts" x="200" y="936" text-anchor="middle" dominant-baseline="central" fill="#3B6D11">3 агента — пары — судья</text>

<path d="M530 724 L530 916 L344 916" class="arr" marker-end="url(#arrow)" fill="none" stroke-dasharray="4 4"/>
<text class="ts" x="530" y="830" text-anchor="middle">SEO только сюда</text>

<line x1="200" y1="952" x2="200" y2="1000" class="arr" marker-end="url(#arrow)"/>

<rect x="60" y="1000" width="280" height="72" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th" x="200" y="1020" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Шаг 6. Итоговый документ</text>
<text class="ts" x="200" y="1040" text-anchor="middle" dominant-baseline="central" fill="#444441">Данные для заполнения</text>
<text class="ts" x="200" y="1056" text-anchor="middle" dominant-baseline="central" fill="#444441">форм Amazon</text>

<line x1="200" y1="1072" x2="200" y2="1106" class="arr" marker-end="url(#arrow)"/>
<rect x="60" y="1106" width="280" height="44" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="200" y="1128" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Книга отправлена в продажу</text>
</svg>
